<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>狐濛哥 · 投資控制台</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<meta name="description" content="狐濛哥的資金配置與盯盤儀表板">
<meta name="theme-color" content="#f4efe6">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2024%2024'%3E%3Cpath%20fill='%23FFD000'%20d='M12%2017.27L18.18%2021l-1.64-7.03L22%209.24l-7.19-.61L12%202%209.19%208.63%202%209.24l5.46%204.73L5.82%2021z'/%3E%3C/svg%3E">
<style>
:root{--bg:#f4efe6;--card:#fffdf8;--ink:#322a1e;--mut:#867a66;--line:#e6dccb;
--accent:#0d9488;--acc2:#14b8a6;--up:#d83c4a;--dn:#0f9d63;--amb:#bd8420;--chip:#efe7d6;--silver:#8a7b63;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"PingFang TC","Microsoft JhengHei",Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55;-webkit-text-size-adjust:100%}
.deck{max-width:960px;margin:0 auto;padding:14px 12px 56px}
.slide{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:12px}
.up{color:var(--up)}.dn{color:var(--dn)}.mut{color:var(--mut)}
.kicker{font-size:11px;font-weight:800;letter-spacing:2px;color:var(--accent);text-transform:uppercase}
h1{font-size:22px;font-weight:800;line-height:1.2}h2{font-size:18px;font-weight:800}
.sub{color:var(--mut);font-size:12.5px}
.apphead{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.syncbtn{background:transparent;border:1px solid var(--accent);color:var(--accent);font-size:12px;font-weight:800;padding:6px 12px;border-radius:20px;cursor:pointer;white-space:nowrap}
.tabs{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap}
.tab{flex:1 1 auto;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:9px 10px;font-size:13.5px;font-weight:800;cursor:pointer;color:var(--mut);text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.tab.on{background:var(--accent);border-color:var(--accent);color:#fff}
input[type=number],input[type=text]{font-family:inherit;font-size:14px;font-weight:700;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:7px;padding:5px 8px}
input:focus,select:focus{outline:none;border-color:var(--accent)}
select{font-family:inherit;font-size:13px;font-weight:800;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:7px;padding:5px 7px}
.btn{background:var(--accent);border:none;color:#fff;font-size:13px;font-weight:800;padding:7px 13px;border-radius:9px;cursor:pointer}
.btn.ghost{background:transparent;color:var(--accent);border:1px solid var(--accent)}
.btn.sm{font-size:12px;padding:5px 10px;border-radius:8px}
.resetbtn{background:transparent;border:1px solid var(--line);color:var(--mut);font-size:12px;font-weight:800;padding:5px 10px;border-radius:8px;cursor:pointer}
.resetbtn:hover{border-color:var(--accent);color:var(--accent)}
.statusrow{display:flex;align-items:center;gap:10px;padding:8px 14px}
.fundrow{display:flex;align-items:center;gap:14px;background:var(--chip);border-radius:10px;padding:9px 13px;flex-wrap:wrap}
.fundrow .fi{display:flex;align-items:center;gap:7px}
.fundrow label{font-size:12.5px;font-weight:800;white-space:nowrap}
.fundrow input{width:128px;font-size:15px;text-align:right}
.fundrow input.sm{width:74px}
.barlbl{font-size:13.5px;color:var(--ink);font-weight:800;margin:14px 0 7px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.bar{display:flex;height:50px;border-radius:9px;overflow:hidden;margin:0 0 6px;border:1px solid var(--line)}
.seg{display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-weight:800;white-space:nowrap;transition:width .25s;overflow:hidden;line-height:1.2;padding:0 3px;text-align:center}
.seg .s1{font-size:12px}.seg .s2{font-size:12px;font-weight:800;opacity:.97}
/* 唯讀明細 */
.brk{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.brk:last-child{border-bottom:none}
.brk .nm{font-weight:800;font-size:14px;display:flex;align-items:center;gap:8px;width:150px;flex:0 0 auto;white-space:nowrap}
.brk .dot{width:13px;height:13px;border-radius:4px;flex:0 0 auto}
.brk .mini{flex:1;height:8px;border-radius:5px;background:var(--line);overflow:hidden;position:relative;min-width:40px}
.brk .mini div{position:absolute;left:0;top:0;bottom:0;border-radius:5px}
.brk .out{flex:0 0 auto;text-align:right;width:140px;font-variant-numeric:tabular-nums;white-space:nowrap}
.brk .out b{font-size:15px}.brk .out .am{font-size:11.5px;color:var(--mut);font-weight:700;margin-left:6px}
.cells{display:flex;gap:9px;flex-wrap:wrap;margin-top:6px}
.cell{flex:1;min-width:104px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:9px 12px}
.cell .l{font-size:11.5px;color:var(--mut);font-weight:800}.cell b{font-size:18px;font-weight:900}
/* 持倉 bar */
.hlist{margin-top:4px}
.hhead{display:flex;align-items:center;gap:8px;padding:9px 4px 6px;margin-top:10px;border-bottom:2px solid var(--line)}
.hhead .cdot{width:12px;height:12px;border-radius:4px;flex:0 0 auto}
.hhead .hcn{font-size:14px;font-weight:800}
.hhead .hst{margin-left:auto;font-size:11.5px;font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap}
.hitem{margin:6px 0;background:var(--card);border:1px solid var(--line);border-left:4px solid var(--mut);border-radius:10px;overflow:hidden}
.hitem.open{box-shadow:0 3px 12px rgba(0,0,0,.07)}
.hbar{display:grid;grid-template-columns:116px 1fr auto;grid-template-areas:"name metrics caret";align-items:center;gap:4px 10px;padding:10px 12px;cursor:pointer}
.hitem.open .hbar{border-bottom:1px dashed var(--line)}
.hbar .hnm{grid-area:name;font-weight:800;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbar .hnm .code{font-size:10.5px;color:var(--mut);font-weight:700;margin-left:5px}
.hmetrics{grid-area:metrics;display:grid;grid-template-columns:repeat(7,1fr);gap:6px;align-items:center}
.met{display:flex;flex-direction:column;align-items:flex-end;line-height:1.2;min-width:0}
.met .ml{font-size:9.5px;color:var(--mut);font-weight:700}
.met .mv{font-size:13px;font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap}
.met .mv .chg{font-size:9.5px;margin-left:3px}
.hcar{grid-area:caret;color:var(--mut);font-size:12px;align-self:center}
.wcar{color:var(--mut);font-size:12px;flex:0 0 auto}
.wmetrics{display:flex;align-items:center;gap:14px;margin-left:auto;flex-wrap:wrap;justify-content:flex-end}
.hedit{display:none;gap:8px 10px;align-items:center;padding:11px 12px;flex-wrap:wrap;font-size:12px;color:var(--mut);background:rgba(0,0,0,.012)}
.hitem.open .hedit{display:flex}
.hedit input{width:96px;font-size:13px;text-align:right;padding:5px 8px}
.hedit select{font-size:13px;font-weight:800;padding:5px 7px}
.hedit .delx{margin-left:auto;color:var(--up);font-weight:800;cursor:pointer;border:1px solid var(--line);border-radius:7px;padding:5px 9px}
@media(max-width:680px){
  .hbar{grid-template-columns:1fr auto;grid-template-areas:"name caret" "metrics metrics";row-gap:8px;padding:9px 11px}
  .hmetrics{gap:4px}.met .mv{font-size:12px}.met .ml{font-size:9px}
}
.addrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px;background:var(--chip);border-radius:10px;padding:10px 12px}
.addrow label{font-size:12px;font-weight:800;color:var(--mut);display:flex;align-items:center;height:40px}
.addrow input,.addrow select,.addrow button{height:40px;line-height:normal}
.addrow input,.addrow select{padding:0 12px;font-size:14px}
.addrow button{padding:0 18px}
/* 總資產配置 */
.srcbar{display:flex;height:26px;border-radius:8px;overflow:hidden;margin:8px 0 4px;border:1px solid var(--line)}
.srcbar .seg{font-size:11px}
.onepie{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.svgpie{flex:0 0 220px;max-width:100%}.svgpie svg{width:100%;max-width:220px;height:auto;filter:drop-shadow(0 8px 10px rgba(0,0,0,.14))}
.pielegend{flex:1;min-width:210px;display:flex;flex-direction:column;gap:7px}
.pli{display:flex;align-items:center;gap:9px;font-size:13px}
.pli .pd{width:12px;height:12px;border-radius:4px;flex:0 0 auto}.pli .pn{font-weight:800;min-width:96px}
.pli .pp{font-weight:800;width:48px;text-align:right;font-variant-numeric:tabular-nums}.pli .pa{color:var(--mut);font-weight:700;margin-left:auto;font-variant-numeric:tabular-nums}
/* 盯盤 */
.wgroup{border:1px solid var(--line);border-radius:14px;padding:6px 10px 10px;margin-bottom:14px;background:rgba(0,0,0,.012)}
.wrow{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--mut);border-radius:11px;margin-bottom:7px;overflow:hidden}
.wrow:last-child{margin-bottom:0}
.whd{display:flex;align-items:center;gap:9px;padding:11px 13px;cursor:pointer;user-select:none;flex-wrap:wrap}
.whd .wnm{font-weight:800;font-size:14.5px;display:flex;gap:6px;align-items:baseline;flex:0 0 auto;min-width:84px}
.whd .wnm .code{font-size:11px;color:var(--mut);font-weight:700}
.wbody{display:none;padding:0 14px 14px;border-top:1px solid var(--line)}
.wrow.open .wbody{display:block}
.wbcols{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:760px){.wbcols{grid-template-columns:1fr;gap:0}}
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;max-width:340px;width:100%}
.mmsg{font-size:14.5px;font-weight:700;margin-bottom:14px;line-height:1.5}
.mbtns{display:flex;gap:8px;justify-content:flex-end}
.mbtns .btn,.mbtns .resetbtn{padding:8px 16px}
.wgrp{font-size:15px;font-weight:800;color:#fff;display:flex;align-items:center;gap:8px;margin:0 -10px 9px;padding:9px 14px;border-radius:13px 13px 9px 9px}
.wgrp .gst{margin-left:auto;font-size:11.5px;font-weight:700;opacity:.93;font-variant-numeric:tabular-nums}
.sect{font-size:11.5px;color:var(--accent);font-weight:800;margin:11px 0 5px;letter-spacing:1px}
.bar-wrap{margin:10px 4px 2px;position:relative;height:52px}
.gbar{position:absolute;top:27px;left:0;right:0;height:6px;border-radius:3px;background:linear-gradient(90deg,var(--dn),var(--amb),var(--up))}
.tick{position:absolute;top:19px;width:2px;height:22px;background:var(--mut)}
.tick span{position:absolute;top:-15px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--mut);white-space:nowrap}
.nowm{position:absolute;top:36px;width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:9px solid var(--accent)}
.nowm span{position:absolute;top:9px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--accent);font-weight:800;white-space:nowrap}
.calc{background:var(--chip);border:1px solid var(--line);border-radius:11px;padding:9px 11px;margin-top:6px}
.calc label{font-size:12px;color:var(--mut);font-weight:800}
.calc input[type=number]{width:100%;font-size:15px;font-weight:800;text-align:center;margin-top:5px}
.calc input[type=range]{width:100%;margin-top:7px}
.bigpl{font-size:18px;font-weight:900;text-align:center;margin:6px 0 0;font-variant-numeric:tabular-nums}
.bigpct{font-size:11.5px;text-align:center;color:var(--mut)}
.mini2{display:flex;justify-content:space-between;font-size:11px;color:var(--mut);margin-top:4px}
.krow{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--line);font-size:12.5px}
.krow:last-child{border-bottom:none}.krow .k{color:var(--mut)}.krow .v{font-weight:800;font-variant-numeric:tabular-nums}
.opts{display:flex;gap:13px;align-items:center;font-size:12px;color:var(--mut);flex-wrap:wrap}
.opts input[type=number]{width:92px;text-align:center;font-size:14px}
.empty{color:var(--mut);font-size:12px;text-align:center;padding:8px;border:1px dashed var(--line);border-radius:9px}
.tiny{font-size:10.5px;color:var(--mut);text-align:right;margin-top:6px}
input[type=range]{-webkit-appearance:none;appearance:none;height:6px;border-radius:4px;background:var(--line);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:19px;height:19px;border-radius:50%;background:var(--accent);cursor:pointer;border:3px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2)}
input[type=range]::-moz-range-thumb{width:17px;height:17px;border-radius:50%;background:var(--accent);cursor:pointer;border:3px solid #fff}
@media(max-width:680px){.deck{padding:10px 7px 40px}.slide{padding:13px 12px}.fundrow input{width:100%}.fundrow .fi{flex:1 1 100%;justify-content:space-between}.svgpie{flex-basis:100%}
  .brk{flex-wrap:wrap}.brk .nm{width:auto;flex:1 1 100%;font-size:13px}.brk .out{width:auto;margin-left:auto}
  .pielegend{min-width:0}.onepie{gap:10px}
}
</style>
</head>
<body>
<div class="deck">

<div class="apphead">
  <div><div class="kicker">投資控制台</div><h1>🦊 狐濛哥</h1></div>
  <button class="syncbtn" id="syncbtn" onclick="fbAuthClick()">⋯ 連線中</button>
</div>

<div class="tabs">
  <div class="tab on" id="tab-tool" onclick="showView('tool')">🛠 評估工具</div>
  <div class="tab" id="tab-assets" onclick="showView('assets')">💰 總資產配置</div>
  <div class="tab" id="tab-watch" onclick="showView('watch')">📈 持股盯盤</div>
</div>

<!-- ===================== Tab1 評估工具 ===================== -->
<div id="view-tool">
<!-- ① 資產配置（依持倉自動） -->
<section class="slide">
  <h2 style="display:flex;align-items:center;gap:9px"><span style="color:var(--accent)">①</span> 資產配置<button class="resetbtn" style="margin-left:auto" onclick="fetchAll()">↻ 抓價</button></h2>
  <div class="bar" id="catbar" style="margin-top:10px"></div>
  <div id="catbrk"></div>
  <div class="barlbl" style="margin-top:14px">投入概況</div>
  <div class="cells" id="cells"></div>
</section>

<!-- ② 持倉部位 -->
<section class="slide">
  <h2><span style="color:var(--accent)">②</span> 持倉部位</h2>
  <div class="addrow" style="margin-top:10px">
    <label>＋股票</label>
    <input type="text" id="add_q" placeholder="輸入股號或名稱，如 2330 / 台積電 / QQQ" style="flex:1;min-width:160px">
    <select id="add_cat"></select>
    <button class="btn sm" id="addbtn" onclick="addHolding()">加入</button>
    <span id="add_msg" class="sub" style="flex-basis:100%;margin-top:2px"></span>
  </div>
  <div class="hlist" id="hlist"></div>
</section>
</div>

<!-- ===================== Tab2 總資產配置 ===================== -->
<div id="view-assets" style="display:none">
<section class="slide">
  <h2 style="font-size:19px;margin-bottom:10px">💰 總資產配置</h2>
  <div class="fundrow">
    <div class="fi"><label>資產總額</label><input type="number" id="as_own" value="1500000" step="100000" min="0"></div>
    <div class="fi"><label>貸款總額</label><input type="number" id="as_loan" value="500000" step="100000" min="0"></div>
    <div class="fi"><label>美元匯率</label><input type="number" id="fx" class="sm" value="32.0" step="0.1" min="20"></div>
  </div>
  <div class="barlbl" style="margin-top:14px">資金來源</div>
  <div class="srcbar" id="as_srcbar"></div>
  <div class="sub" id="as_srctxt" style="margin-top:4px"></div>

  <div class="barlbl" style="margin-top:14px">總資產分布<span id="as_tot" style="margin-left:auto;color:var(--mut);font-weight:700;font-size:12px"></span></div>
  <div class="onepie">
    <div class="svgpie" id="as_pie"></div>
    <div class="pielegend" id="as_legend"></div>
  </div>
</section>
</div>

<!-- ===================== Tab3 持股盯盤 ===================== -->
<div id="view-watch" style="display:none">
<section class="slide" style="padding:9px 14px">
  <div class="statusrow" style="padding:0"><span style="font-size:15px;font-weight:800">📈 持股盯盤</span>
    <button class="resetbtn" id="expandbtn" style="margin-left:auto" onclick="toggleAllWatch()">▦ 全部展開</button>
    <button class="resetbtn" onclick="fetchAll()">↻ 抓價</button></div>
</section>
<div id="watchlist"></div>
<section class="slide">
  <div class="opts">
    手續費折扣 <input type="number" id="disc" value="0.5" step="0.05" min="0.1" max="1">（5折=0.5）
    ｜手續費 0.1425%×折扣，證交稅 0.3%
    ｜<label style="font-weight:800"><input type="checkbox" id="aftertax" checked style="width:auto"> 計入稅費</label>
  </div>
</section>
</div>

</div>

<script>
/* ───────── 工具 ───────── */
const f0=n=>isFinite(n)?Math.round(n).toLocaleString():'—';
const fpx=n=>isFinite(n)?(+n).toLocaleString(undefined,{maximumFractionDigits:2}):'—';
const col=v=>v>0?'var(--up)':(v<0?'var(--dn)':'var(--mut)');
const num=v=>{const n=parseFloat(v);return isFinite(n)?n:null;};
function gv(id){const e=document.getElementById(id);return e?(parseFloat(e.value)||0):0;}

/* ───────── 分類（銀色彈藥=現金，不收個股） ───────── */
const CATS=[
  {id:'etf',   name:'ETF（美股）',    color:'#0d9488'},
  {id:'short', name:'短線（資金靈活）', color:'#bd8420'},
  {id:'mid',   name:'中長期',         color:'#14b8a6'},
  {id:'silver',name:'銀色彈藥',       color:'#8a7b63'}
];
const DRAGCATS=CATS.filter(c=>c.id!=='silver');
const POOL='pool';const VALIDCAT={etf:1,short:1,mid:1};
function catColor(id){const c=CATS.find(x=>x.id===id);return c?c.color:'#b9ad99';}

const DEF=[['1717','長興'],['6442','光聖'],['6235','華孚'],['6446','藥華藥'],['6962','奕力-KY'],
  ['4763','材料-KY'],['1513','中興電'],['1519','華城'],['3037','欣興']];

/* ───────── 狀態 ───────── */
const LSKEY='humeng_v4';
let S={fx:32.0,disc:0.5,
  holdings:DEF.map(d=>({code:d[0],name:d[1],market:'tw',cat:POOL,shares:0,cost:0})),
  assets:{own:1500000,loan:500000}};
try{const sv=JSON.parse(localStorage.getItem(LSKEY));if(sv&&sv.holdings){S=Object.assign(S,sv);if(!S.assets)S.assets={own:1500000,loan:500000};}}catch(e){}
S.holdings.forEach(h=>{if((h.cat||POOL)!==POOL&&!VALIDCAT[h.cat])h.cat=POOL;});
const PX={};const DATA={};const WOPEN={};
function save(){try{localStorage.setItem(LSKEY,JSON.stringify(S));}catch(e){}if(typeof fbSave==='function')fbSave();}

function showView(v){['tool','assets','watch'].forEach(k=>{document.getElementById('view-'+k).style.display=v===k?'':'none';
  document.getElementById('tab-'+k).className='tab'+(v===k?' on':'');});
  if(v==='assets')recalcAssets();if(v==='watch')buildWatch();}

/* ───────── 計算核心 ───────── */
function totalCapital(){return gv('as_own')+gv('as_loan');}
function holdingMV(h){const p=PX[h.code];const cur=p&&p.price>0?p.price:(h.cost||0);if(!h.shares||h.shares<=0)return 0;return cur*h.shares*(h.market==='us'?gv('fx'):1);}
function holdingCost(h){if(!h.shares||!h.cost)return 0;return h.cost*h.shares*(h.market==='us'?gv('fx'):1);}
function catMVById(cid){let mv=0;S.holdings.forEach(h=>{if((h.cat||POOL)===cid)mv+=holdingMV(h);});return mv;}
function totalInvested(){let s=0;S.holdings.forEach(h=>s+=holdingMV(h));return s;}
function alloc(){
  const total=totalCapital();let invested=0;const cm={};DRAGCATS.forEach(c=>cm[c.id]=0);let poolMV=0;
  S.holdings.forEach(h=>{const mv=holdingMV(h);invested+=mv;if(cm[h.cat]!=null)cm[h.cat]+=mv;else poolMV+=mv;});
  const silver=Math.max(0,total-invested);
  return{total,invested,poolMV,silver,cm};
}

/* ───────── ① 四大類 bar + 唯讀明細 ───────── */
function recalcAlloc(){
  const a=alloc();const total=a.total||1;
  /* 各段（含待分類） */
  const segs=DRAGCATS.map(c=>({name:c.name,color:c.color,mv:a.cm[c.id]}));
  if(a.poolMV>0)segs.push({name:'待分類',color:'#b9ad99',mv:a.poolMV});
  segs.push({name:'銀色彈藥',color:'#8a7b63',mv:a.silver});
  const sum=segs.reduce((s,x)=>s+x.mv,0)||1;
  const SHORT={'ETF（美股）':'ETF','短線（資金靈活）':'短線','中長期':'中長期','銀色彈藥':'銀彈','待分類':'待分'};
  const bar=document.getElementById('catbar');if(bar){bar.innerHTML='';
    segs.forEach(s=>{const w=s.mv/sum*100;if(w<=0.2)return;const d=document.createElement('div');d.className='seg';
      d.style.width=w+'%';d.style.background=s.color;d.title=s.name+' '+w.toFixed(0)+'%';
      const label=w>=15?s.name:(w>=7?(SHORT[s.name]||s.name):'');
      d.innerHTML=(label?'<span class="s1">'+label+'</span>':'')+'<span class="s2">'+w.toFixed(0)+'%</span>';bar.appendChild(d);});}
  const brk=document.getElementById('catbrk');if(brk){brk.innerHTML='';
    segs.forEach(s=>{const pct=s.mv/total*100;const row=document.createElement('div');row.className='brk';
      row.innerHTML='<span class="nm"><span class="dot" style="background:'+s.color+'"></span>'+s.name+'</span>'+
        '<span class="mini"><div style="width:'+Math.min(100,pct)+'%;background:'+s.color+'"></div></span>'+
        '<span class="out"><b style="color:'+s.color+'">'+pct.toFixed(0)+'%</b><span class="am">$'+f0(s.mv)+'</span></span>';
      brk.appendChild(row);});}
  recalcCells(a);updateHeadStats();
}
function recalcCells(a){
  a=a||alloc();const cells=document.getElementById('cells');if(!cells)return;
  let totCost=0;S.holdings.forEach(h=>totCost+=holdingCost(h));
  const pnl=a.invested-totCost;const port=totCost>0?pnl/totCost*100:0;
  cells.innerHTML=cell('總資金','$'+f0(a.total),'var(--ink)')+cell('已投入市值','$'+f0(a.invested),'var(--ink)')+
    cell('未實現損益',(pnl>=0?'+':'−')+'$'+f0(Math.abs(pnl)),col(pnl))+
    cell('報酬率',totCost>0?((port>=0?'+':'')+port.toFixed(1)+'%'):'—',col(pnl))+
    cell('銀色彈藥（現金）','$'+f0(a.silver),'var(--silver)');
}
function cell(l,v,c){return '<div class="cell"><div class="l">'+l+'</div><b style="color:'+c+'">'+v+'</b></div>';}

  const list=document.getElementById('hlist');list.innerHTML='';
  DRAGCATS.concat([{id:POOL,name:'待分類',color:'#b9ad99'}]).forEach(c=>{
    const items=S.holdings.map((h,i)=>({h,i})).filter(x=>(x.h.cat||POOL)===c.id);

    const hd=document.createElement('div');hd.className='hhead';hd.dataset.cat=c.id;
    hd.innerHTML='<span class="cdot" style="background:'+c.color+'"></span><span class="hcn">'+c.name+'</span><span class="hst" id="hst_'+c.id+'"></span>';

    items.forEach(x=>list.appendChild(makeBar(x.h,x.i)));
  });

}
function makeBar(h,idx){
  const item=document.createElement('div');item.className='hitem'+(h._open?' open':'');item.dataset.idx=idx;
  const bar=document.createElement('div');bar.className='hbar';item.style.borderLeftColor=catColor(h.cat);
  bar.innerHTML=barInner(h);
  bar.addEventListener('click',()=>{item.classList.toggle('open');h._open=item.classList.contains('open');});
  const edit=document.createElement('div');edit.className='hedit';
  const opts=[{id:POOL,name:'待分類'}].concat(DRAGCATS).map(c=>'<option value="'+c.id+'"'+((h.cat||POOL)===c.id?' selected':'')+'>'+c.name+'</option>').join('');

    '<span>均價</span><input type="number" data-f="cost" value="'+(h.cost||'')+'" step="any" min="0" placeholder="0">'+
    '<span>股數</span><input type="number" data-f="shares" value="'+(h.shares||'')+'" step="any" min="0" placeholder="0">'+
    '<span class="delx" data-act="del">✕ 刪除</span>';
  edit.querySelectorAll('input').forEach(inp=>{
    inp.addEventListener('input',e=>{const f=e.target.dataset.f;S.holdings[idx][f]=e.target.value===''?0:(parseFloat(e.target.value)||0);
      refreshBar(bar,S.holdings[idx]);recalcAlloc();save();});});
  edit.querySelector('select[data-f=cat]').addEventListener('change',e=>{S.holdings[idx].cat=e.target.value;buildList();recalcAlloc();save();});
  edit.querySelector('[data-act=del]').addEventListener('click',async()=>{
    if(await uiConfirm('刪除 '+S.holdings[idx].name+'？')){S.holdings.splice(idx,1);buildList();recalcAlloc();save();}});
  item.appendChild(bar);item.appendChild(edit);return item;

function barInner(h){
  const p=PX[h.code]||{};const cur=p.price,prev=p.prev;
  let chg='';if(isFinite(cur)&&isFinite(prev)&&prev>0){const d=(cur/prev-1)*100;chg='<span class="chg" style="color:'+col(d)+'">'+(d>=0?'+':'')+d.toFixed(1)+'%</span>';}
  let pltxt='—',plc='var(--mut)';if(h.cost>0&&isFinite(cur)&&cur>0){const pl=(cur/h.cost-1)*100;pltxt=(pl>=0?'+':'')+pl.toFixed(1)+'%';plc=col(pl);}
  const mv=holdingMV(h);const catmv=catMVById(h.cat);const tinv=totalInvested();
  const wpctCat=catmv>0&&mv>0?mv/catmv*100:0;const wpctAll=tinv>0&&mv>0?mv/tinv*100:0;
  const lots=h.shares>0?(h.market==='us'?(h.shares+' 股'):((h.shares/1000).toFixed(h.shares>=1000?1:2)+' 張')):'—';
  const invAmt=holdingCost(h);
  return '<span class="hnm">'+h.name+'<span class="code">'+h.code+(h.market==='us'?' US':'')+'</span></span>'+
    '<span class="hmetrics">'+
      metCell('現價',(isFinite(cur)&&cur>0?fpx(cur):'—')+chg)+
      metCell('成本均價',h.cost>0?fpx(h.cost):'—')+
      metCell('損益','<span style="color:'+plc+'">'+pltxt+'</span>')+
      metCell('股數',lots)+
      metCell('投入金額',invAmt>0?'$'+f0(invAmt):'—')+
      metCell('佔類別',wpctCat>0?wpctCat.toFixed(0)+'%':'—')+
      metCell('佔整體','<span style="color:'+catColor(h.cat)+'">'+(wpctAll>0?wpctAll.toFixed(0)+'%':'—')+'</span>')+
    '</span><span class="hcar">▾</span>';
}
function metCell(l,v){return '<span class="met"><span class="ml">'+l+'</span><span class="mv">'+v+'</span></span>';}
function refreshBar(bar,h){bar.innerHTML=barInner(h);}
function updateHeadStats(){
  const total=totalCapital()||1;
  DRAGCATS.concat([{id:POOL}]).forEach(c=>{const el=document.getElementById('hst_'+c.id);if(!el)return;
    const items=S.holdings.filter(h=>(h.cat||POOL)===c.id);let mv=0;items.forEach(h=>mv+=holdingMV(h));
    if(c.id===POOL){el.innerHTML=items.length+' 檔';return;}
    el.innerHTML='$'+f0(mv)+'　<b style="color:'+catColor(c.id)+'">'+(mv/total*100).toFixed(0)+'%</b>';});
}
function updateBarPrices(){document.querySelectorAll('#hlist .hitem').forEach(item=>{const idx=+item.dataset.idx;const h=S.holdings[idx];if(!h)return;refreshBar(item.querySelector('.hbar'),h);});recalcAlloc();}

/* 用 Yahoo search 把「名稱/代號」解析成 {code,name,market} */
function twRank(s){return /\.TWO?$/.test(s)?1:0;}
async function yahooSearch(q){
  const url='https://query1.finance.yahoo.com/v1/finance/search?q='+encodeURIComponent(q)+'&quotesCount=8&newsCount=0&lang=zh-TW&region=TW';
  const j=await pfetch(url,x=>(x&&x.quotes&&x.quotes.length)?x:null,7000);
  if(!j)return null;
  const eq=j.quotes.filter(it=>it.symbol&&it.quoteType!=='CURRENCY'&&it.quoteType!=='INDEX'&&it.quoteType!=='FUTURE');
  if(!eq.length)return null;
  eq.sort((a,b)=>twRank(b.symbol)-twRank(a.symbol));/* 台股優先 */
  const it=eq[0];const sym=it.symbol;const name=(it.shortname||it.longname||sym).trim();
  if(/\.TWO?$/.test(sym))return{code:sym.replace(/\.TWO?$/,''),name,market:'tw'};
  return{code:sym,name,market:'us'};
}
async function resolveStock(q){
  q=q.trim();
  if(/^[0-9]{3,6}[A-Za-z]?$/.test(q)){            /* 台股股號 */
    for(const ex of ['tse','otc']){const j=await pfetch(twseUrl(ex,q),x=>(x&&x.msgArray&&x.msgArray[0]&&x.msgArray[0].n)?x:null,7000);
      const m=j&&j.msgArray&&j.msgArray[0];if(m&&m.n)return{code:q,name:m.n.trim(),market:'tw'};}
    const hit=await yahooSearch(q);if(hit)return hit;
    return{code:q,name:q,market:'tw'};
  }
  if(/^[A-Za-z][A-Za-z.\-]{0,6}$/.test(q)){       /* 美股代號 */
    const hit=await yahooSearch(q);if(hit)return hit;return{code:q.toUpperCase(),name:q.toUpperCase(),market:'us'};
  }
  return await yahooSearch(q);                     /* 中文/英文名稱 */
}
async function addHolding(){
  const qi=document.getElementById('add_q');const q=qi.value.trim();const cat=document.getElementById('add_cat').value;
  const msg=document.getElementById('add_msg');const btn=document.getElementById('addbtn');
  if(!q){msg.style.color='var(--up)';msg.textContent='請輸入股號或名稱';return;}
  btn.disabled=true;msg.style.color='var(--mut)';msg.textContent='查詢中…';
  let info=null;try{info=await resolveStock(q);}catch(e){}
  btn.disabled=false;
  if(!info||!info.code){msg.style.color='var(--up)';msg.textContent='找不到「'+q+'」，請改用股號（如 2330）。';return;}
  if(S.holdings.some(h=>h.code===info.code)){msg.style.color='var(--up)';msg.textContent='已經有 '+info.name+'（'+info.code+'）了。';return;}
  S.holdings.push({code:info.code,name:info.name,market:info.market,cat,shares:0,cost:0});
  qi.value='';msg.style.color='var(--dn)';msg.textContent='已加入 '+info.name+'（'+info.code+'·'+(info.market==='us'?'美股':'台股')+'）';
  buildList();recalcAlloc();save();
  fetchOne(S.holdings[S.holdings.length-1]).then(()=>updateBarPrices());
}

/* ───────── 盯盤（依分類分組） ───────── */
function feeNet(cost,sh,exit,us){const disc=gv('disc')||0.5;const tax=document.getElementById('aftertax').checked;const mult=us?gv('fx'):1;
  const gross=(exit-cost)*sh*mult;let fee=0;if(tax)fee=(cost*sh*0.001425*disc+exit*sh*(0.001425*disc+0.003))*mult;
  return{net:gross-fee,gross,fee:gross-(gross-fee),pct:cost>0?(gross-fee)/(cost*sh*mult)*100:0};}
function pivots(p,code){const d=DATA[code];if(d&&isFinite(d.up)&&isFinite(d.mid)&&isFinite(d.dn))return{up:d.up,mid:d.mid,dn:d.dn,src:'盤後'};
  if(!p||!isFinite(p.high)||!isFinite(p.low)||!isFinite(p.close))return null;const P=(p.high+p.low+p.close)/3;return{mid:P,up:2*P-p.low,dn:2*P-p.high,src:'樞紐'};}
function buildWatch(){
  const box=document.getElementById('watchlist');box.innerHTML='';
  if(!S.holdings.length){box.innerHTML='<section class="slide"><div class="empty">尚無持股，到「評估工具」加入。</div></section>';return;}
  const wrap=document.createElement('section');wrap.className='slide';
  DRAGCATS.concat([{id:POOL,name:'待分類',color:'#b9ad99'}]).forEach(c=>{
    const items=S.holdings.map((h,i)=>({h,i})).filter(x=>(x.h.cat||POOL)===c.id);
    if(!items.length)return;
    let mv=0;items.forEach(x=>mv+=holdingMV(x.h));
    const grp=document.createElement('div');grp.className='wgroup';
    const g=document.createElement('div');g.className='wgrp';g.style.background=c.color;
    g.innerHTML=c.name+'<span class="gst">'+items.length+' 檔 · $'+f0(mv)+'</span>';
    grp.appendChild(g);
    items.forEach(x=>grp.appendChild(makeWatchRow(x.h,x.i,c.color)));
    wrap.appendChild(grp);
  });
  box.appendChild(wrap);
  document.getElementById('expandbtn').textContent=Object.values(WOPEN).some(v=>v)?'▦ 全部收合':'▦ 全部展開';
}
function makeWatchRow(h,idx,color){
  const row=document.createElement('div');row.className='wrow'+(WOPEN[h.code]?' open':'');row.id='w_'+idx;
  row.style.borderLeftColor=color||catColor(h.cat);
  row.innerHTML='<div class="whd"><span class="wnm">'+h.name+'<span class="code">'+h.code+(h.market==='us'?' US':'')+'</span></span>'+
    '<span class="wmetrics">'+
      '<span class="met"><span class="ml">現價</span><span class="mv" id="wpx_'+idx+'">—</span></span>'+
      '<span class="met"><span class="ml">損益</span><span class="mv" id="wpl_'+idx+'"></span></span>'+
      '<span class="met"><span class="ml">市值</span><span class="mv" id="wmv_'+idx+'">—</span></span>'+
    '</span><span class="wcar">▾</span></div><div class="wbody" id="wb_'+idx+'"></div>';
  row.querySelector('.whd').addEventListener('click',()=>{WOPEN[h.code]=!WOPEN[h.code];row.classList.toggle('open',WOPEN[h.code]);if(WOPEN[h.code])renderWatchBody(idx);
    document.getElementById('expandbtn').textContent=Object.values(WOPEN).some(v=>v)?'▦ 全部收合':'▦ 全部展開';});
  if(WOPEN[h.code])setTimeout(()=>renderWatchBody(idx),0);
  setTimeout(()=>updWatchHead(idx),0);
  return row;
}
function toggleAllWatch(){const any=Object.values(WOPEN).some(v=>v);S.holdings.forEach(h=>WOPEN[h.code]=!any);buildWatch();}
function updWatchHead(idx){const h=S.holdings[idx];if(!h)return;const p=PX[h.code]||{};const cur=p.price,prev=p.prev;
  const pe=document.getElementById('wpx_'+idx);if(pe){let chg='';if(isFinite(cur)&&isFinite(prev)&&prev>0){const d=(cur/prev-1)*100;chg='<span class="chg" style="color:'+col(d)+'">'+(d>=0?'+':'')+d.toFixed(1)+'%</span>';}pe.innerHTML=(isFinite(cur)&&cur>0?fpx(cur):'—')+chg;}
  const ple=document.getElementById('wpl_'+idx);if(ple){if(h.cost>0&&isFinite(cur)&&cur>0){const pl=(cur/h.cost-1)*100;ple.textContent=(pl>=0?'+':'')+pl.toFixed(1)+'%';ple.style.color=col(pl);}else{ple.textContent='—';ple.style.color='var(--mut)';}}
  const me=document.getElementById('wmv_'+idx);if(me){const mv=holdingMV(h);me.textContent=mv>0?'$'+f0(mv):'—';}}
function renderWatchBody(idx){
  const h=S.holdings[idx];const body=document.getElementById('wb_'+idx);if(!body)return;
  body.innerHTML='<div class="wbcols"><div class="wbcol">'+
      '<div class="sect">三關價（明日 · <span id="pvsrc_'+idx+'"></span>）</div><div class="bar-wrap" id="mbar_'+idx+'"></div>'+

        '<div class="mini2"><span>毛利 <b id="mgr_'+idx+'"></b></span><span>稅費 <b id="mfe_'+idx+'"></b></span></div></div>'+
      '<div class="sect">持倉（均價／股數）</div><div class="opts">均價 <input type="number" id="wc_'+idx+'" step="any" value="'+(h.cost||'')+'" placeholder="0">　股數 <input type="number" id="wq_'+idx+'" step="any" value="'+(h.shares||'')+'" placeholder="0"></div>'+
    '</div><div class="wbcol">'+
      '<div class="sect">均線 / 關鍵價位</div><div id="mlv_'+idx+'"></div>'+
    '</div></div>';
  const inp=document.getElementById('min_'+idx),rg=document.getElementById('mrg_'+idx);
  inp.addEventListener('input',()=>{rg.value=inp.value;updWatchBody(idx);});
  rg.addEventListener('input',()=>{inp.value=rg.value;updWatchBody(idx);});

  ['wc','wq'].forEach(pfx=>{document.getElementById(pfx+'_'+idx).addEventListener('input',e=>{
    if(pfx==='wc')S.holdings[idx].cost=parseFloat(e.target.value)||0;else S.holdings[idx].shares=parseFloat(e.target.value)||0;
    updWatchBody(idx);updWatchHead(idx);recalcAlloc();save();});});

function initRange(idx){const h=S.holdings[idx];const p=PX[h.code]||{};const base=(p.price>0?p.price:(h.cost>0?h.cost:100));
  const rg=document.getElementById('mrg_'+idx),inp=document.getElementById('min_'+idx);if(!rg)return;
  rg.min=(base*0.7).toFixed(2);rg.max=(base*1.4).toFixed(2);rg.step=base>=500?1:(base>=50?0.5:0.05);
  if(!inp.value){inp.value=(+base).toFixed(2);rg.value=base;}}
function updWatchBody(idx){
  const h=S.holdings[idx];const us=h.market==='us';const p=PX[h.code]||{};const cur=p.price;
  const px=parseFloat((document.getElementById('min_'+idx)||{}).value)||cur||h.cost||0;
  if(h.shares>0&&h.cost>0){const r=feeNet(h.cost,h.shares,px,us);
    const o=document.getElementById('mout_'+idx);if(o){o.textContent=(r.net>=0?'+':'')+f0(r.net)+' 元';o.style.color=col(r.net);}
    const pc=document.getElementById('mpct_'+idx);if(pc)pc.textContent='報酬率 '+(r.pct>=0?'+':'')+r.pct.toFixed(2)+'% @ '+fpx(px);
    const g=document.getElementById('mgr_'+idx);if(g)g.textContent=(r.gross>=0?'+':'')+f0(r.gross);
    const fe=document.getElementById('mfe_'+idx);if(fe)fe.textContent='−'+f0(r.fee);
  }else{const o=document.getElementById('mout_'+idx);if(o){o.textContent='填均價＋股數後試算';o.style.color='var(--mut)';}['mpct','mgr','mfe'].forEach(p2=>{const e=document.getElementById(p2+'_'+idx);if(e)e.textContent='';});}
  const pv=pivots(p,h.code);const ps=document.getElementById('pvsrc_'+idx);if(ps)ps.textContent=pv?pv.src+'推算':'—';
  const bar=document.getElementById('mbar_'+idx);
  if(bar){if(pv&&isFinite(cur)&&cur>0){const lo=Math.min(pv.dn,cur)*0.997,hi=Math.max(pv.up,cur)*1.003;const pos=x=>((x-lo)/(hi-lo)*100);const tk=(l,t)=>'<div class="tick" style="left:'+l+'%"><span>'+t+'</span></div>';
      bar.innerHTML='<div class="gbar"></div>'+tk(pos(pv.dn),'下關 '+fpx(pv.dn))+tk(pos(pv.mid),'中關 '+fpx(pv.mid))+tk(pos(pv.up),'上關 '+fpx(pv.up))+'<div class="nowm" style="left:'+pos(cur)+'%"><span>現 '+fpx(cur)+'</span></div>';}
    else bar.innerHTML='<div class="empty">尚無足夠資料（先 ↻ 抓價）</div>';}
  const lv=document.getElementById('mlv_'+idx);const d=DATA[h.code]||{};const ma=MAC[h.code]||{};
  if(lv){let rows='';const add=(k,v)=>{rows+='<div class="krow"><span class="k">'+k+'</span><span class="v">'+(isFinite(v)?fpx(v):'…')+'</span></div>';};
    add('現價',cur);add('前收',p.prev);add('今日高',p.high);add('今日低',p.low);
    add('五日線',ma.ma5);add('月線 (20)',ma.ma20!=null?ma.ma20:d.ma20);add('季線 (60)',ma.ma60!=null?ma.ma60:d.ma60);add('年線 (240)',ma.ma240);
    if(pv){add('上關',pv.up);add('中關（多空分界）',pv.mid);add('下關',pv.dn);}if(h.cost>0)add('你的均價',h.cost);
    lv.innerHTML=rows;}
}

/* ───────── 報價：自建後端 → TWSE → Yahoo ───────── */
const BACKEND='';
const PROXIES=['https://api.allorigins.win/raw?url=','https://corsproxy.io/?url=','https://api.codetabs.com/v1/proxy/?quest='];
async function pfetch(url,validate,ms){for(const px of PROXIES){try{const c=new AbortController();const to=setTimeout(()=>c.abort(),ms||7000);
  const r=await fetch(px+encodeURIComponent(url),{signal:c.signal});clearTimeout(to);const j=await r.json();const out=validate(j);if(out)return out;}catch(e){}}return null;}
async function backendQuote(code,market){if(!BACKEND)return null;try{const c=new AbortController();const to=setTimeout(()=>c.abort(),7000);
  const r=await fetch(BACKEND.replace(/\/$/,'')+'/?code='+encodeURIComponent(code)+'&market='+market,{signal:c.signal});clearTimeout(to);const j=await r.json();
  if(j&&isFinite(j.price))return{price:j.price,prev:num(j.prev),high:num(j.high),low:num(j.low),close:j.price,src:'後端'};}catch(e){}return null;}
function twseUrl(ex,code){return 'https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch='+ex+'_'+code+'.tw&json=1&delay=0&_='+Date.now();}
function twseParse(j){const m=j&&j.msgArray&&j.msgArray[0];if(!m)return null;
  let price=num(m.z);if(price==null)price=num((m.b||'').split('_')[0]);if(price==null)price=num((m.a||'').split('_')[0]);if(price==null)price=num(m.y);
  const prev=num(m.y),high=num(m.h),low=num(m.l);if(price!=null)return{price,prev,high,low,close:price,src:'TWSE'};return null;}
function yahooUrl(sym){return 'https://query1.finance.yahoo.com/v8/finance/chart/'+encodeURIComponent(sym)+'?range=5d&interval=1d';}
function yahooParse(j){const r=j&&j.chart&&j.chart.result&&j.chart.result[0];if(!r)return null;const m=r.meta||{};const price=m.regularMarketPrice;if(!isFinite(price))return null;
  const q=(r.indicators&&r.indicators.quote&&r.indicators.quote[0])||{};const highs=(q.high||[]).filter(x=>x!=null),lows=(q.low||[]).filter(x=>x!=null);
  return{price,prev:m.chartPreviousClose||m.previousClose,high:m.regularMarketDayHigh||(highs.length?highs[highs.length-1]:null),low:m.regularMarketDayLow||(lows.length?lows[lows.length-1]:null),close:price,src:'Yahoo'};}
const SRC={};
async function fetchOne(h){
  const b=await backendQuote(h.code,h.market);if(b){PX[h.code]=b;return true;}
  const cached=SRC[h.code];
  if(cached){let r=cached.m==='twse'?await pfetch(twseUrl(cached.ex,h.code),twseParse,7000):await pfetch(yahooUrl(cached.sym),yahooParse,7000);if(r){PX[h.code]=r;return true;}}
  if(h.market!=='us'){for(const ex of ['tse','otc']){const r=await pfetch(twseUrl(ex,h.code),twseParse,7000);if(r){PX[h.code]=r;SRC[h.code]={m:'twse',ex};return true;}}}
  const syms=h.market==='us'?[h.code]:[h.code+'.TW',h.code+'.TWO'];
  for(const sym of syms){const r=await pfetch(yahooUrl(sym),yahooParse,7000);if(r){PX[h.code]=r;SRC[h.code]={m:'yahoo',sym};return true;}}
  return false;
}

/* 均線：展開盯盤時，前端抓近一年日線自算 5/20/60/240 日均 */
const MAC={};
function maOf(c,n){if(!c||c.length<n)return null;let s=0;for(let i=c.length-n;i<c.length;i++)s+=c[i];return s/n;}
async function ensureMA(h){if(MAC[h.code])return;const syms=h.market==='us'?[h.code]:[h.code+'.TW',h.code+'.TWO'];
  for(const sym of syms){const cl=await pfetch('https://query1.finance.yahoo.com/v8/finance/chart/'+encodeURIComponent(sym)+'?range=1y&interval=1d',
    j=>{const r=j&&j.chart&&j.chart.result&&j.chart.result[0];if(!r)return null;const q=r.indicators&&r.indicators.quote&&r.indicators.quote[0];const c=((q&&q.close)||[]).filter(x=>x!=null);return c.length>5?c:null;},8000);
    if(cl){MAC[h.code]={ma5:maOf(cl,5),ma20:maOf(cl,20),ma60:maOf(cl,60),ma240:maOf(cl,240)};return;}}}

/* ───────── 總資產配置（單一圓餅，依持倉） ───────── */
function pieSlicePath(cx,cy,r,a0,a1){const pt=a=>{const rad=(a-90)*Math.PI/180;return [cx+r*Math.cos(rad),cy+r*Math.sin(rad)];};
  if(a1-a0>=359.999)return 'M'+(cx-r)+' '+cy+' A'+r+' '+r+' 0 1 1 '+(cx+r)+' '+cy+' A'+r+' '+r+' 0 1 1 '+(cx-r)+' '+cy+' Z';
  const s=pt(a0),e=pt(a1),lg=(a1-a0)>180?1:0;return 'M'+cx+' '+cy+' L'+s[0].toFixed(2)+' '+s[1].toFixed(2)+' A'+r+' '+r+' 0 '+lg+' 1 '+e[0].toFixed(2)+' '+e[1].toFixed(2)+' Z';}
function recalcAssets(){
  const own=gv('as_own'),loan=gv('as_loan');const a=alloc();const total=a.total||1;
  const sb=document.getElementById('as_srcbar');if(sb){sb.innerHTML='';[['自有 '+(own>0?(+(own/(own+loan||1)*100).toFixed(0)):0)+'%',own,'#0d9488'],['貸款 '+(loan>0?(+(loan/(own+loan||1)*100).toFixed(0)):0)+'%',loan,'#bd8420']].forEach(g=>{if(g[1]<=0)return;
    const d=document.createElement('div');d.className='seg';d.style.width=(g[1]/Math.max(own+loan,1)*100)+'%';d.style.background=g[2];d.innerHTML='<span class="s1">'+g[0]+'</span>';sb.appendChild(d);});}
  const st=document.getElementById('as_srctxt');if(st)st.innerHTML='總資金 <b>$'+f0(a.total)+'</b>　已投入 <b>$'+f0(a.invested)+'</b>　現金（銀色彈藥）$'+f0(a.silver)+(loan>0&&own>0?'　·　<span class="up">槓桿 '+(+(loan/own*100).toFixed(0))+'%</span>':'');
  /* 圓餅：四大類（含銀彈現金）依持倉 */
  const slices=DRAGCATS.map(c=>({name:c.name,color:c.color,amt:a.cm[c.id]}));
  if(a.poolMV>0)slices.push({name:'待分類',color:'#b9ad99',amt:a.poolMV});
  slices.push({name:'銀色彈藥（現金）',color:'#8a7b63',amt:a.silver});
  let acc=0,paths='',lg='';slices.forEach(s=>{const pct=s.amt/total*100;if(pct<=0){lg+=legendRow(s,pct);return;}const a0=acc,a1=acc+pct/100*360;acc=a1;
    paths+='<path d="'+pieSlicePath(100,66,56,a0,a1)+'" fill="'+s.color+'" stroke="#fff8ee" stroke-width="1"/>';lg+=legendRow(s,pct);});
  const pe=document.getElementById('as_pie');if(pe)pe.innerHTML='<svg viewBox="0 0 200 138"><ellipse cx="100" cy="78" rx="56" ry="34" fill="#b3a489"/><g transform="translate(100 66) scale(1 0.62) translate(-100 -66)">'+paths+'</g></svg>';
  const le=document.getElementById('as_legend');if(le)le.innerHTML=lg;
  const te=document.getElementById('as_tot');if(te)te.textContent='合計 $'+f0(a.total);
  S.assets={own,loan};save();
}
function legendRow(s,pct){return '<div class="pli"><span class="pd" style="background:'+s.color+'"></span><span class="pn">'+s.name+'</span><span class="pp">'+pct.toFixed(0)+'%</span><span class="pa">$'+f0(s.amt)+'</span></div>';}

/* ═══════════ Firebase 雲端同步 ═══════════ */
const FB_CONFIG={apiKey:"AIzaSyAeka6qrpElotxc4mi8FgG0tROhVp93g9g",authDomain:"humeng-portfolio.firebaseapp.com",projectId:"humeng-portfolio",storageBucket:"humeng-portfolio.firebasestorage.app",messagingSenderId:"835294126286",appId:"1:835294126286:web:3ee19f7616bbcb2561709f"};
let fbRef=null,fbUnsub=null,fbTimer=null,fbApplying=false;
let CKEY=null,CKEY_TAG='',CSALT='',_keyP=null;
/* ── 端對端加密：資料用密語加密後才上雲，後台/擁有者都解不開 ── */
function _b64(a){return btoa(String.fromCharCode.apply(null,a));}
function _unb64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0));}
async function deriveKey(pass,salt){const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:150000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);}
async function encryptJSON(key,obj){const iv=crypto.getRandomValues(new Uint8Array(12));
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(JSON.stringify(obj)));
  return{iv:_b64(iv),enc:_b64(new Uint8Array(ct))};}
async function decryptJSON(key,ivB,encB){const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:_unb64(ivB)},key,_unb64(encB));
  return JSON.parse(new TextDecoder().decode(pt));}
function askPass(isSetup){return new Promise(res=>{
  const ov=document.createElement('div');ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  ov.innerHTML='<div style="background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;max-width:340px;width:100%">'+
    '<div style="font-weight:800;font-size:15px;margin-bottom:6px">'+(isSetup?'🔒 設定同步密語':'🔑 輸入同步密語')+'</div>'+
    '<div style="font-size:12px;color:var(--mut);margin-bottom:10px;line-height:1.5">'+(isSetup?'這組密語用來加密你的雲端資料，連網站管理者都看不到。請牢記——忘記將無法復原。':'輸入你設定的密語以解鎖雲端資料。')+'</div>'+
    '<input type="password" id="_pp1" placeholder="密語" style="width:100%;margin-bottom:8px;padding:9px 11px">'+
    (isSetup?'<input type="password" id="_pp2" placeholder="再次輸入" style="width:100%;margin-bottom:8px;padding:9px 11px">':'')+
    '<div id="_pperr" style="color:var(--up);font-size:12px;font-weight:700;min-height:15px"></div>'+
    '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px"><button id="_ppc" class="resetbtn">取消</button><button id="_ppok" class="btn sm">確定</button></div></div>';
  document.body.appendChild(ov);const p1=ov.querySelector('#_pp1');setTimeout(()=>p1.focus(),50);
  const done=v=>{ov.remove();res(v);};
  ov.querySelector('#_ppc').onclick=()=>done(null);
  ov.querySelector('#_ppok').onclick=()=>{const v1=p1.value;const v2=isSetup?ov.querySelector('#_pp2').value:v1;const err=ov.querySelector('#_pperr');
    if(!v1){err.textContent='請輸入密語';return;}if(isSetup&&v1.length<4){err.textContent='密語至少 4 碼';return;}if(isSetup&&v1!==v2){err.textContent='兩次輸入不一致';return;}done(v1);};
  p1.addEventListener('keydown',e=>{if(e.key==='Enter')ov.querySelector('#_ppok').click();});
});}
function uiConfirm(msg){return new Promise(res=>{const ov=document.createElement('div');ov.className='ovl';
  ov.innerHTML='<div class="modal"><div class="mmsg">'+msg+'</div><div class="mbtns"><button class="resetbtn" id="_mc">取消</button><button class="btn sm" id="_mo">確定</button></div></div>';
  document.body.appendChild(ov);ov.querySelector('#_mc').onclick=()=>{ov.remove();res(false);};ov.querySelector('#_mo').onclick=()=>{ov.remove();res(true);};
  ov.addEventListener('click',e=>{if(e.target===ov){ov.remove();res(false);}});});}
function uiAlert(msg){return new Promise(res=>{const ov=document.createElement('div');ov.className='ovl';
  ov.innerHTML='<div class="modal"><div class="mmsg">'+msg+'</div><div class="mbtns"><button class="btn sm" id="_mo">確定</button></div></div>';
  document.body.appendChild(ov);ov.querySelector('#_mo').onclick=()=>{ov.remove();res();};});}
function ensureKey(d,uid){const salt=(d&&d.salt)?d.salt:(CSALT||_b64(crypto.getRandomValues(new Uint8Array(16))));const tag=uid+'|'+salt;
  if(CKEY&&CKEY_TAG===tag){CSALT=salt;return Promise.resolve(true);}
  if(_keyP)return _keyP;
  _keyP=(async()=>{CSALT=salt;const hasData=!!(d&&d.enc);let pass=localStorage.getItem('humeng_pass_'+uid)||'';
    while(true){if(!pass){pass=await askPass(!hasData);if(pass==null)return false;}
      const key=await deriveKey(pass,_unb64(CSALT));
      if(hasData){try{await decryptJSON(key,d.iv,d.enc);}catch(e){await uiAlert('密語不對，請再試一次');pass='';continue;}}
      CKEY=key;CKEY_TAG=tag;try{localStorage.setItem('humeng_pass_'+uid,pass);}catch(e){}return true;}
  })().finally(()=>{_keyP=null;});return _keyP;}
function setSync(t,on){const b=document.getElementById('syncbtn');if(!b)return;b.textContent=t;b.style.borderColor=on?'var(--accent)':'var(--line)';b.style.color=on?'var(--accent)':'var(--mut)';}
function fbAuthClick(){if(FB_CONFIG.apiKey==='PASTE_ME'){alert('目前用「本機儲存」：資料存在這台裝置的瀏覽器。要跨手機/電腦同步，請把 Firebase 的 firebaseConfig 貼進檔案的 FB_CONFIG。');return;}
  const auth=firebase.auth();if(auth.currentUser){uiConfirm('登出雲端同步？').then(ok=>{if(ok)auth.signOut();});}else auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e=>uiAlert('登入失敗：'+e.message));}
function fbApplyRemote(d){fbApplying=true;try{
  if(d.holdings)S.holdings=d.holdings;if(d.assets)S.assets=d.assets;
  if(d.fx){S.fx=d.fx;const x=document.getElementById('fx');if(x&&document.activeElement!==x)x.value=d.fx;}
  if(d.disc!=null){S.disc=d.disc;const e=document.getElementById('disc');if(e&&document.activeElement!==e)e.value=d.disc;}
  if(d.assets){['own','loan'].forEach(k=>{const e=document.getElementById('as_'+k);if(e&&d.assets[k]!=null&&document.activeElement!==e)e.value=d.assets[k];});}
  S.holdings.forEach(h=>{if((h.cat||POOL)!==POOL&&!VALIDCAT[h.cat])h.cat=POOL;});
  try{localStorage.setItem(LSKEY,JSON.stringify(S));}catch(e){}
  buildList();recalcAlloc();
  if(document.getElementById('view-assets').style.display!=='none')recalcAssets();if(document.getElementById('view-watch').style.display!=='none')buildWatch();
  fetchAll();
}finally{fbApplying=false;}}
function fbSave(){if(!fbRef||fbApplying||!CKEY)return;clearTimeout(fbTimer);fbTimer=setTimeout(async()=>{
  try{const p=await encryptJSON(CKEY,{holdings:S.holdings,assets:S.assets,fx:S.fx,disc:S.disc});
    await fbRef.set({salt:CSALT,iv:p.iv,enc:p.enc,t:Date.now()});
    setSync('🔒 已加密同步 · '+(firebase.auth().currentUser.email||''),true);
  }catch(e){setSync('⚠ 同步失敗，點此重試',false);}},700);}
(function fbInit(){if(FB_CONFIG.apiKey==='PASTE_ME'){setSync('💾 本機儲存',false);return;}
  try{firebase.initializeApp(FB_CONFIG);const db=firebase.firestore();try{db.enablePersistence({synchronizeTabs:true});}catch(e){}
    firebase.auth().onAuthStateChanged(u=>{if(fbUnsub){fbUnsub();fbUnsub=null;}
      if(u){fbRef=db.collection('users').doc(u.uid).collection('app').doc('state');setSync('☁ 已連線 · '+(u.email||''),true);
        fbUnsub=fbRef.onSnapshot(async snap=>{
          if(snap.metadata.hasPendingWrites)return;
          const d=snap.exists?snap.data():null;
          const ok=await ensureKey(d,u.uid);if(!ok){setSync('🔑 需要密語才能同步',false);return;}
          if(d&&d.enc){try{const obj=await decryptJSON(CKEY,d.iv,d.enc);fbApplyRemote(obj);setSync('🔒 已加密同步 · '+(u.email||''),true);}catch(e){setSync('⚠ 解密失敗',false);}}
          else{if(d&&d.holdings)fbApplyRemote(d);fbSave();}
        });
      }else{fbRef=null;setSync('🔑 登入啟用雲端同步',false);}});
  }catch(e){setSync('⚠ Firebase 初始化失敗',false);}})();
